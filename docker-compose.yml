version: '3.8'

services:
  web:
    build: .
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      - PORT=8000
      - MONGO_URI=mongodb://mongo:27017/billmanager
      - FRONTEND_URL=http://your-ec2-ip-or-domain
    depends_on:
      - mongo

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
